# fly.toml app configuration file generated for cryptobank on 2026-07-05T14:12:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cryptobank'
primary_region = 'jnb'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  STATE_FILE = '/data/mono-div-state.json'

[[mounts]]
  source = 'mono_div_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
