# Fly.io app config for Mono & DIV Coin Game.
# Change the app name to your own unique Fly app name before deploy.
app = "mono-div-coin-game"
primary_region = "jnb"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  STATE_FILE = "/data/mono-div-state.json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "mono_div_data"
  destination = "/data"
